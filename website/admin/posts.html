<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Posts &mdash; Admin</title>
<meta name="robots" content="noindex, nofollow" />
<script src="/assets/vendor/tailwind.js"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        ink:   { DEFAULT: '#163243', soft: '#34495E' },
        teal:  { DEFAULT: '#00B7EA', deep: '#0E5E6E', soft: '#D6F0F8' },
        coral: { DEFAULT: '#E84F3B', soft: '#FCE0DA' },
        sun:   { DEFAULT: '#F4C842', soft: '#FFF1C2' },
        sage:  { DEFAULT: '#C5E0D5', soft: '#E6F1EB' },
        cream: '#FAF5E6',
        mute:  '#6B7E8F',
        line:  '#E8DFD0'
      },
      fontFamily: {
        sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
        display: ['Fraunces', 'Georgia', 'serif']
      }
    }
  }
}
</script>
<link rel="stylesheet" href="/assets/css/app.css" />
<link rel="stylesheet" href="/admin/admin.css" />
</head>
<body class="admin font-sans">
  <header class="admin-topbar">
    <a class="admin-topbar__brand" href="/admin/">
      <span class="dot" aria-hidden="true"></span>
      <span>On Target Admin</span>
    </a>
    <nav class="admin-topbar__nav" aria-label="Admin">
      <a href="/admin/">Dashboard</a>
      <a href="/admin/posts.html">Posts</a>
      <a href="/admin/header.html">Header</a>
      <a href="/admin/footer.html">Footer</a>
    </nav>
    <div class="admin-topbar__right">
      <span data-user-email class="admin-muted"></span>
      <button class="btn btn-ghost btn-sm" type="button" data-action="logout">Log out</button>
    </div>
  </header>

  <main class="admin-page">
    <div class="flex items-end justify-between flex-wrap gap-3 mb-5">
      <div>
        <p class="admin-eyebrow mb-1">Blog</p>
        <h1 class="admin-h1">All posts</h1>
      </div>
      <a class="btn btn-primary" href="/admin/post-editor.html?new=1">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        New post
      </a>
    </div>

    <div class="toolbar">
      <input id="search" class="input" type="search" placeholder="Search title, slug, category, excerpt&hellip;" />
      <select id="filter" class="select" style="max-width:160px;">
        <option value="">All statuses</option>
        <option value="live">Live</option>
        <option value="draft">Draft</option>
        <option value="hidden">Hidden</option>
      </select>
      <select id="cat" class="select" style="max-width:180px;">
        <option value="">All categories</option>
      </select>
      <span data-saving class="admin-muted" style="margin-left:auto;font-size:0.8rem;"></span>
    </div>

    <div class="admin-card">
      <div style="overflow-x:auto;">
        <table class="admin-table" id="posts-table">
          <thead>
            <tr>
              <th style="width:30%;">Title</th>
              <th>Slug</th>
              <th>Category</th>
              <th style="width:110px;">Date</th>
              <th style="width:120px;">Status</th>
              <th style="text-align:right;">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr><td colspan="6"><div class="empty">Loading posts&hellip;</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/admin/admin.js"></script>
  <script>
  (async function () {
    await Admin.requireAuth();
    const tbody = document.querySelector('#posts-table tbody');
    const savingSlot = document.querySelector('[data-saving]');
    const search = document.getElementById('search');
    const filter = document.getElementById('filter');
    const catSel = document.getElementById('cat');
    let allPosts = [];

    function statusOf(p) {
      if (p.hidden) return 'hidden';
      if (p.draft) return 'draft';
      return 'live';
    }
    function pillFor(s) {
      if (s === 'live')  return '<span class="pill pill-live">Live</span>';
      if (s === 'draft') return '<span class="pill pill-draft">Draft</span>';
      return '<span class="pill pill-hidden">Hidden</span>';
    }

    function render() {
      const q = (search.value || '').toLowerCase().trim();
      const f = filter.value;
      const c = catSel.value;
      const filtered = allPosts.filter(function (p) {
        if (f && statusOf(p) !== f) return false;
        if (c && (p.category || '') !== c) return false;
        if (!q) return true;
        return (p.title || '').toLowerCase().includes(q)
            || (p.slug || '').toLowerCase().includes(q)
            || (p.category || '').toLowerCase().includes(q)
            || (p.excerpt || '').toLowerCase().includes(q);
      });
      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="empty">No posts match.</div></td></tr>';
        return;
      }
      tbody.innerHTML = '';
      filtered.forEach(function (p) {
        const status = statusOf(p);
        const tr = document.createElement('tr');
        tr.dataset.slug = p.slug;
        tr.innerHTML =
          '<td><div style="font-weight:600;"></div><div class="admin-muted" style="font-size:0.78rem;max-width:480px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div></td>' +
          '<td><code style="font-size:0.8rem;color:var(--ink-soft);"></code></td>' +
          '<td></td>' +
          '<td class="admin-muted" style="font-size:0.85rem;"></td>' +
          '<td></td>' +
          '<td class="row-actions">' +
            '<a class="btn btn-ghost btn-sm" data-action="edit">Edit</a>' +
            '<button class="btn btn-ghost btn-sm" type="button" data-action="draft"></button>' +
            '<button class="btn btn-ghost btn-sm" type="button" data-action="hide"></button>' +
            '<button class="btn btn-danger btn-sm" type="button" data-action="delete">Delete</button>' +
          '</td>';
        tr.children[0].children[0].textContent = p.title || p.slug;
        tr.children[0].children[1].textContent = p.excerpt || '';
        tr.children[1].querySelector('code').textContent = p.slug;
        tr.children[2].textContent = p.category || '—';
        tr.children[3].textContent = p.date || '';
        tr.children[4].innerHTML = pillFor(status);
        tr.querySelector('[data-action="edit"]').href = '/admin/post-editor.html?slug=' + encodeURIComponent(p.slug);
        tr.querySelector('[data-action="draft"]').textContent = p.draft ? 'Publish' : 'Draft';
        tr.querySelector('[data-action="hide"]').textContent  = p.hidden ? 'Unhide' : 'Hide';
        tbody.appendChild(tr);
      });
    }

    function rebuildCategories() {
      const cats = Array.from(new Set(allPosts.map(function (p) { return p.category; }).filter(Boolean))).sort();
      catSel.innerHTML = '<option value="">All categories</option>' +
        cats.map(function (c) { return '<option value="' + c.replace(/"/g, '&quot;') + '">' + c + '</option>'; }).join('');
    }

    async function load() {
      try {
        const data = await Admin.api.get('/api/posts');
        allPosts = (data && data.posts) || [];
        rebuildCategories();
        render();
      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="empty">Failed to load posts.</div></td></tr>';
        Admin.toast('Could not load posts', 'error');
      }
    }

    tbody.addEventListener('click', async function (e) {
      const btn = e.target.closest('button[data-action], a[data-action]');
      if (!btn) return;
      const row = btn.closest('tr');
      const slug = row && row.dataset.slug;
      if (!slug) return;
      const action = btn.dataset.action;
      const post = allPosts.find(function (p) { return p.slug === slug; });
      if (!post) return;
      if (action === 'edit') return;

      if (action === 'delete') {
        if (!confirm('Delete post "' + (post.title || slug) + '"? This opens a PR; the post stays live until the PR merges.')) return;
        await mutate(btn, function () {
          return Admin.api.del('/api/posts/' + encodeURIComponent(slug));
        }, 'Delete PR opened');
        return;
      }

      // Hide / Draft via PUT with merged frontmatter (post endpoints don't expose hide/draft endpoints; fall back to PUT)
      try {
        btn.disabled = true;
        const done = Admin.saving(savingSlot, 'Submitting PR&hellip;');
        // Fetch current content to keep markdown intact
        const cur = await Admin.api.get('/api/posts/' + encodeURIComponent(slug));
        const fm = parseFrontmatter(cur.markdown);
        if (action === 'draft') fm.frontmatter.draft = !post.draft;
        if (action === 'hide')  fm.frontmatter.hidden = !post.hidden;
        const res = await Admin.api.put('/api/posts/' + encodeURIComponent(slug), {
          frontmatter: fm.frontmatter,
          body: fm.body,
          sha: cur.sha
        });
        done('Saved');
        Admin.toast('PR opened', 'success');
        if (res && res.pr) {
          Admin.showPrSubmittedModal(res.pr, {
            title: (action === 'draft' ? 'Draft toggle' : 'Hide toggle') + ' — PR #' + res.pr.number,
            secondaryLabel: 'Back to posts',
            secondaryHref: '/admin/posts.html',
            onSecondary: function () { document.querySelector('.modal-backdrop').remove(); load(); }
          });
        } else {
          load();
        }
      } catch (err) {
        Admin.toast(err.message || 'Action failed', 'error');
      } finally {
        btn.disabled = false;
      }
    });

    async function mutate(btn, fn, label) {
      btn.disabled = true;
      const done = Admin.saving(savingSlot, 'Submitting PR&hellip;');
      try {
        const res = await fn();
        done('Saved');
        Admin.toast(label, 'success');
        if (res && res.pr) {
          Admin.showPrSubmittedModal(res.pr, {
            title: label + ' (PR #' + res.pr.number + ')',
            secondaryLabel: 'Back to posts',
            secondaryHref: '/admin/posts.html',
            onSecondary: function () { document.querySelector('.modal-backdrop').remove(); load(); }
          });
        } else {
          load();
        }
      } catch (err) {
        Admin.toast(err.message || 'Action failed', 'error');
        done();
      } finally {
        btn.disabled = false;
      }
    }

    // Minimal YAML frontmatter parser (matches blog post format: --- ... --- body)
    function parseFrontmatter(md) {
      const out = { frontmatter: {}, body: md || '' };
      if (!md) return out;
      const m = md.match(/^---\s*\n([\s\S]*?)\n---\s*\n?([\s\S]*)$/);
      if (!m) return out;
      const lines = m[1].split(/\r?\n/);
      lines.forEach(function (ln) {
        const kv = ln.match(/^([A-Za-z0-9_]+)\s*:\s*(.*)$/);
        if (!kv) return;
        let val = kv[2].trim();
        if (val === 'true') val = true;
        else if (val === 'false') val = false;
        else if (/^".*"$/.test(val) || /^'.*'$/.test(val)) val = val.slice(1, -1);
        out.frontmatter[kv[1]] = val;
      });
      out.body = m[2] || '';
      return out;
    }

    search.addEventListener('input', Admin.debounce(render, 120));
    filter.addEventListener('change', render);
    catSel.addEventListener('change', render);

    await load();
  })();
  </script>
</body>
</html>
